<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    rect.bg {
      fill: #000000;
      transition: fill 0.3s ease;
    }
    rect.border {
      stroke: #ffffff;
      transition: stroke 0.3s ease;
    }
    text.symbol {
      fill: #ffffff;
      transition: fill 0.3s ease;
    }
    @media (prefers-color-scheme: light) {
      rect.bg {
        fill: #ffffff;
      }
      rect.border {
        stroke: #000000;
      }
      text.symbol {
        fill: #000000;
      }
    }
  </style>
  <rect class="bg" width="100" height="100" rx="20"/>
  <rect class="border" x="10" y="10" width="80" height="80" fill="none" stroke-width="6" rx="12"/>
  <text class="symbol" x="50" y="62" font-family="monospace" font-weight="900" font-size="48" text-anchor="middle">M</text>
</svg>